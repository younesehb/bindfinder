settings:
  result_list_width_percent: 45
  show_footer: true
  wrap_preview: true

keybindings:
  quit:
    - "q"
    - "esc"
    - "ctrl-c"
  clear_query:
    - "ctrl-u"
  move_up:
    - "up"
    - "k"
  move_down:
    - "down"
    - "j"
  page_up:
    - "pageup"
    - "ctrl-u"
  page_down:
    - "pagedown"
    - "ctrl-d"
  goto_top:
    - "g g"
  goto_bottom:
    - "shift-g"
  select:
    - "enter"
  search_mode:
    - "/"
  favorite_entry:
    - "f"
  hide_entry:
    - "x"
  favorite_tool:
    - "shift-f"
  hide_tool:
    - "shift-x"
  toggle_hidden:
    - "z"
  toggle_favorites_only:
    - "m"

integration:
  mode: "auto"
  launch_key: "alt-/"
  tmux:
    enabled: true
    key: "/"
    use_popup: false
    popup_width: "80%"
    popup_height: "80%"
    debug: false
  shell:
    enabled: true
    preferred: "auto"
    binding: "alt-/"
  terminal:
    enabled: false
    preferred: "auto"
