name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            archive_suffix: x86_64-unknown-linux-musl
          - os: macos-14
            target: aarch64-apple-darwin
            archive_suffix: aarch64-apple-darwin

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl tools
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package archive
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          ARCHIVE_DIR="dist/bindfinder-${VERSION}-${{ matrix.archive_suffix }}"
          mkdir -p "${ARCHIVE_DIR}"
          cp "target/${{ matrix.target }}/release/bindfinder" "${ARCHIVE_DIR}/"
          cp README.md LICENSE CHANGELOG.md install.sh "${ARCHIVE_DIR}/"
          mkdir -p "${ARCHIVE_DIR}/man/man1"
          cp man/bindfinder.1 "${ARCHIVE_DIR}/man/man1/"
          tar -C dist -czf "${ARCHIVE_DIR}.tar.gz" "bindfinder-${VERSION}-${{ matrix.archive_suffix }}"

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: bindfinder-${{ matrix.archive_suffix }}
          path: dist/*.tar.gz
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Flatten artifacts
        shell: bash
        run: |
          set -euo pipefail
          find dist -type f -name '*.tar.gz' -exec mv {} dist/ \;

      - name: Resolve release notes
        id: notes
        shell: bash
        run: |
          set -euo pipefail
          NOTES_FILE="docs/releases/${GITHUB_REF_NAME}.md"
          if [ ! -f "$NOTES_FILE" ]; then
            echo "missing release notes file: $NOTES_FILE"
            exit 1
          fi
          echo "path=$NOTES_FILE" >> "$GITHUB_OUTPUT"

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body_path: ${{ steps.notes.outputs.path }}
          files: |
            dist/*.tar.gz
            install.sh

  update-homebrew-tap:
    if: startsWith(github.ref, 'refs/tags/')
    needs: release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Flatten artifacts
        shell: bash
        run: |
          set -euo pipefail
          find dist -type f -name '*.tar.gz' -exec mv {} dist/ \;

      - name: Compute release metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          LINUX_ARCHIVE="dist/bindfinder-${VERSION}-x86_64-unknown-linux-musl.tar.gz"
          MAC_ARCHIVE="dist/bindfinder-${VERSION}-aarch64-apple-darwin.tar.gz"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "linux_sha=$(sha256sum "$LINUX_ARCHIVE" | awk '{print $1}')" >> "$GITHUB_OUTPUT"
          echo "mac_sha=$(sha256sum "$MAC_ARCHIVE" | awk '{print $1}')" >> "$GITHUB_OUTPUT"

      - name: Update tap formula
        env:
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          VERSION: ${{ steps.meta.outputs.version }}
          LINUX_SHA: ${{ steps.meta.outputs.linux_sha }}
          MAC_SHA: ${{ steps.meta.outputs.mac_sha }}
        shell: bash
        run: |
          set -euo pipefail

          if [ -z "${TAP_TOKEN:-}" ]; then
            echo "HOMEBREW_TAP_TOKEN is not configured"
            exit 1
          fi

          git clone "https://x-access-token:${TAP_TOKEN}@github.com/younesehb/homebrew-tap.git" tap

          cat > tap/Formula/bindfinder.rb <<EOF
          class Bindfinder < Formula
            desc "Terminal command palette and cheatsheet browser for commands, keybindings, and shell workflows"
            homepage "https://github.com/younesehb/bindfinder"
            license "MIT"
            version "${VERSION}"

            on_macos do
              if Hardware::CPU.arm?
                url "https://github.com/younesehb/bindfinder/releases/download/v#{version}/bindfinder-#{version}-aarch64-apple-darwin.tar.gz"
                sha256 "${MAC_SHA}"
              end
            end

            on_linux do
              if Hardware::CPU.intel?
                url "https://github.com/younesehb/bindfinder/releases/download/v#{version}/bindfinder-#{version}-x86_64-unknown-linux-musl.tar.gz"
                sha256 "${LINUX_SHA}"
              end
            end

            def install
              bin.install "bindfinder"
              man1.install "man/man1/bindfinder.1"
            end

            test do
              assert_match "bindfinder", shell_output("#{bin}/bindfinder --help")
            end
          end
          EOF

          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git diff --quiet -- Formula/bindfinder.rb; then
            echo "Tap formula already up to date"
            exit 0
          fi

          git add Formula/bindfinder.rb
          git commit -m "Update bindfinder ${VERSION}"
          git push origin HEAD:main
