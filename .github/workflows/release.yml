name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            archive_suffix: x86_64-unknown-linux-musl
          - os: macos-14
            target: aarch64-apple-darwin
            archive_suffix: aarch64-apple-darwin

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl tools
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package archive
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          ARCHIVE_DIR="dist/bindfinder-${VERSION}-${{ matrix.archive_suffix }}"
          mkdir -p "${ARCHIVE_DIR}"
          cp "target/${{ matrix.target }}/release/bindfinder" "${ARCHIVE_DIR}/"
          cp README.md LICENSE CHANGELOG.md install.sh "${ARCHIVE_DIR}/"
          mkdir -p "${ARCHIVE_DIR}/man/man1"
          cp man/bindfinder.1 "${ARCHIVE_DIR}/man/man1/"
          tar -C dist -czf "${ARCHIVE_DIR}.tar.gz" "bindfinder-${VERSION}-${{ matrix.archive_suffix }}"

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: bindfinder-${{ matrix.archive_suffix }}
          path: dist/*.tar.gz
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Flatten artifacts
        shell: bash
        run: |
          set -euo pipefail
          find dist -type f -name '*.tar.gz' -exec mv {} dist/ \;

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            install.sh
