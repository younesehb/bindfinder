name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive_suffix: x86_64-unknown-linux-gnu
          - os: macos-13
            target: x86_64-apple-darwin
            archive_suffix: x86_64-apple-darwin
          - os: macos-14
            target: aarch64-apple-darwin
            archive_suffix: aarch64-apple-darwin

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package archive
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          ARCHIVE_DIR="dist/bindfinder-${VERSION}-${{ matrix.archive_suffix }}"
          mkdir -p "${ARCHIVE_DIR}"
          cp "target/${{ matrix.target }}/release/bindfinder" "${ARCHIVE_DIR}/"
          cp README.md LICENSE CHANGELOG.md "${ARCHIVE_DIR}/"
          mkdir -p "${ARCHIVE_DIR}/man/man1"
          cp man/bindfinder.1 "${ARCHIVE_DIR}/man/man1/"
          tar -C dist -czf "${ARCHIVE_DIR}.tar.gz" "bindfinder-${VERSION}-${{ matrix.archive_suffix }}"

      - name: Upload release artifact
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: dist/bindfinder-*.tar.gz
