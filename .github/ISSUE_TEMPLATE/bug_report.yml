name: Bug report
description: Report a behavior problem in bindfinder
title: "[bug] "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: Describe the problem clearly and concretely.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the exact steps that trigger the issue.
      placeholder: |
        1. Run ...
        2. Press ...
        3. See ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: dropdown
    id: environment
    attributes:
      label: Environment
      options:
        - Linux
        - macOS
        - tmux
        - SSH
        - shell integration
    validations:
      required: true

  - type: textarea
    id: version
    attributes:
      label: Version and logs
      description: Include `bindfinder --version`, `bindfinder doctor`, and any relevant logs.
      render: shell
